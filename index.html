<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberNote Pro - Workspace</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
    <style>
        :root { --bg-main: #f9fafb; --bg-panel: #ffffff; --text-main: #111827; --border: #e5e7eb; --accent: #0ea5e9; --danger: #ef4444; --select-bg: #e0f2fe; --q-color: #1e40af; --a-color: #15803d; }
        body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: sans-serif; }
        nav { padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-panel); }
        .api-container { display: flex; align-items: center; gap: 8px; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; background-color: var(--danger); }
        .status-dot.active { background-color: #22c55e; }
        main { display: flex; flex: 1; overflow: hidden; }
        
        #left-sidebar { width: 300px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg-panel); }
        #pdf-list-container { flex: 1; overflow-y: auto; padding: 1rem; }
        .pdf-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 4px; }
        .pdf-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; margin-right: 8px; }
        .pdf-item:hover { background: var(--bg-main); }
        .pdf-item.selected { background: var(--select-bg); border-color: var(--accent); }
        
        #loader { display: none; width: 16px; height: 16px; border: 3px solid #e5e7eb; border-top: 3px solid #22c55e; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #flashcard-section { padding: 1rem; border-top: 2px solid var(--border); }
        #center-viewer { flex: 1; display: flex; flex-direction: column; background: #333; overflow: hidden; }
        #viewer-controls { padding: 10px; background: #444; color: white; display: flex; gap: 10px; justify-content: center; align-items: center; }
        
        /* Updated container styling: extra bottom padding to lift the scrollbar */
        #pdf-canvas-container { flex: 1; overflow: auto; display: flex; justify-content: flex-start; padding: 20px 20px 60px 20px; align-items: flex-start; }
        canvas { box-shadow: 0 4px 10px rgba(0,0,0,0.5); background-color: white; }
        
        #right-sidebar { width: 300px; border-left: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg-panel); }
        #chat-output { flex: 1; overflow-y: auto; padding: 1rem; font-size: 0.9rem; border-bottom: 1px solid var(--border); line-height: 1.5; }
        .chat-input { padding: 1rem; display: flex; gap: 4px; }
        
        .page-ref { background: #fee2e2; color: #b91c1c; padding: 2px 5px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        .send-btn { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        
        .fc-item { margin-bottom: 12px; padding: 8px; border: 1px solid var(--border); border-radius: 4px; }
        .q-label { color: var(--q-color); font-weight: bold; }
        .a-label { color: var(--a-color); font-weight: bold; }
        .fc-pg { color: var(--danger); font-size: 0.75rem; font-weight: bold; display: block; margin-top: 4px; }
    </style>
</head>
<body>
    <nav>
        <strong>CyberNote Pro</strong>
        <div class="api-container">
            <input type="password" id="api-key" placeholder="Gemini API Key..." oninput="checkApiKey()">
            <div id="api-status" class="status-dot"></div>
        </div>
    </nav>
    <main>
        <section id="left-sidebar">
            <div id="pdf-list-container">
                <div style="display: flex; align-items: center; margin-bottom: 10px;">
                    <input type="file" id="file-input" accept="application/pdf" onchange="addPDF(event)" style="width: 100%;">
                    <div id="loader"></div>
                </div>
                <div id="pdf-list"></div>
            </div>
            <div id="flashcard-section">
                <h3>Flashcards</h3>
                <div id="flashcard-output" style="height: 150px; overflow-y: auto; font-size: 0.85rem; margin-bottom:10px;">Select PDF to start.</div>
                <button style="width: 100%;" onclick="generateFlashcards()">Generate 15 Flashcards</button>
            </div>
        </section>

        <section id="center-viewer">
            <div id="viewer-controls">
                <button onclick="changePage(-1)">Prev</button>
                <span id="page-info">0 / 0</span>
                <button onclick="changePage(1)">Next</button>
                <input type="range" id="zoom" min="50" max="150" step="5" value="85" oninput="updateZoom()">
                <span id="zoom-text">85%</span>
            </div>
            <div id="pdf-canvas-container"></div>
        </section>

        <section id="right-sidebar">
            <div id="chat-output">Ask anything about your document!</div>
            <div class="chat-input">
                <input type="text" id="user-query" style="flex: 1; padding: 8px;" placeholder="Message..." onkeypress="if(event.key==='Enter') askGemini()">
                <button class="send-btn" onclick="askGemini()">➤</button>
            </div>
        </section>
    </main>

    <script type="module">
        import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

        let pdfs = [], activePdf = null, pageNum = 1, percent = 85;
        const pageCache = new Map();
        const loader = document.getElementById('loader');

        window.checkApiKey = () => document.getElementById('api-status').classList.toggle('active', document.getElementById('api-key').value.length > 10);
        
        window.addPDF = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            loader.style.display = 'block';
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const originalBuffer = e.target.result;
                    const docData = new Uint8Array(originalBuffer.slice(0));
                    const doc = await pdfjsLib.getDocument(docData).promise;
                    const uint8Array = new Uint8Array(originalBuffer.slice(0));
                    let binary = "";
                    for (let i = 0; i < uint8Array.length; i++) { binary += String.fromCharCode(uint8Array[i]); }
                    const base64 = btoa(binary);
                    pdfs.push({ id: Date.now(), name: file.name, doc, base64 });
                    renderSidebar();
                } finally { loader.style.display = 'none'; }
            };
            reader.readAsArrayBuffer(file);
        };

        function renderSidebar() {
            const list = document.getElementById('pdf-list');
            list.innerHTML = '';
            pdfs.forEach(p => {
                const div = document.createElement('div');
                div.className = `pdf-item ${activePdf?.id === p.id ? 'selected' : ''}`;
                div.innerHTML = `<span class="pdf-name" title="${p.name}">${p.name}</span> <span style="color:red; cursor:pointer;" onclick="removePDF(event, ${p.id})">🗑️</span>`;
                div.onclick = (e) => { if(e.target.tagName !== 'SPAN') selectPDF(p); };
                list.appendChild(div);
            });
        }

        window.removePDF = (event, id) => {
            event.stopPropagation();
            pdfs = pdfs.filter(p => p.id !== id);
            if(activePdf?.id === id) { activePdf = null; document.getElementById('pdf-canvas-container').innerHTML = ''; }
            renderSidebar();
        };

        window.selectPDF = async (pdfObj) => { 
            if (activePdf === pdfObj) return;
            activePdf = pdfObj; pageNum = 1; renderSidebar(); renderPage(); 
        };

        window.renderPage = async () => {
            if(!activePdf) return;
            loader.style.display = 'block';
            const page = await activePdf.doc.getPage(pageNum);
            const viewport = page.getViewport({ scale: (percent / 100) * 1.5 }); 
            const canvas = document.createElement('canvas');
            canvas.height = viewport.height; canvas.width = viewport.width;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            document.getElementById('pdf-canvas-container').innerHTML = '';
            document.getElementById('pdf-canvas-container').appendChild(canvas);
            document.getElementById('page-info').textContent = `${pageNum} / ${activePdf.doc.numPages}`;
            loader.style.display = 'none';
        };

        window.updateZoom = () => { percent = parseInt(document.getElementById('zoom').value); document.getElementById('zoom-text').textContent = percent + "%"; if(activePdf) renderPage(); };
        window.changePage = (dir) => { if(!activePdf) return; const newPage = pageNum + dir; if(newPage >= 1 && newPage <= activePdf.doc.numPages) { pageNum = newPage; renderPage(); } };

        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        window.askGemini = async (prompt, isFlash = false, attempt = 0) => {
            const apiKey = document.getElementById('api-key').value;
            const output = isFlash ? document.getElementById('flashcard-output') : document.getElementById('chat-output');
            const query = typeof prompt === 'string' ? prompt : document.getElementById('user-query').value;
            
            if(!activePdf) return output.innerText = "Please select a PDF.";
            
            if (attempt === 0) output.innerText = "Processing...";
            
            const body = { contents: [{ role: "user", parts: [{ text: query + " (Please include page references like (Page X) in your response)" }, { inlineData: { mimeType: "application/pdf", data: activePdf.base64 } }] }] };
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
                });
                
                if (res.status === 429 && attempt < 5) {
                    const delay = Math.pow(2, attempt) * 1000;
                    await sleep(delay);
                    return askGemini(query, isFlash, attempt + 1);
                }

                if (!res.ok) throw new Error(`API Error: ${res.status}`);

                const data = await res.json();
                let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response.";
                
                if (isFlash) {
                    const regex = /Q:\s*(.*?)\s*\|\s*A:\s*(.*?)(?:\s*\(Page\s*(\d+)\)|$)/gi;
                    let match, html = '';
                    while ((match = regex.exec(text)) !== null) {
                        html += `<div class="fc-item"><span class="q-label">Q:</span> ${match[1]}<br><span class="a-label">A:</span> ${match[2]} <span class="fc-pg">pg: ${match[3] || '?'}</span></div>`;
                    }
                    output.innerHTML = html || "No flashcards found.";
                } else {
                    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    text = text.replace(/\n(\d+\.)/g, '<br><strong>$1</strong>');
                    text = text.replace(/\(Page (\d+)\)/g, '<span class="page-ref" onclick="goToPage($1)">(Page $1)</span>');
                    output.innerHTML = text.replace(/\n/g, '<br>');
                }
            } catch (err) {
                output.innerText = "Error: " + err.message;
            }
            if (attempt === 0) document.getElementById('user-query').value = '';
        };

        window.goToPage = (p) => { pageNum = parseInt(p); renderPage(); };
        window.generateFlashcards = () => askGemini("Create 15 flashcards. Format each as: Q: [Question] | A: [Answer] (Page X)", true);
    </script>
</body>
</html>
